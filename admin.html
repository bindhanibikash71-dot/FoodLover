<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - Ramyasri Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .hidden-section { display: none !important; }
        .tab-btn.active { border-bottom: 2px solid #f97316; color: #f97316; }
        .kot-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            .kot-print, .kot-print * { visibility: visible; }
            .kot-print { position: absolute; left: 0; top: 0; width: 300px; padding: 10px; font-family: monospace; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Auth Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-50 bg-gray-900 flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
            <img src="https://i.ibb.co/nNMJzzwx/IMG-20260412-WA0000.jpg" class="h-20 w-20 rounded-full mx-auto mb-4">
            <h2 class="text-2xl font-bold mb-2">Admin Portal</h2>
            <p class="text-gray-500 mb-6 text-sm">Authorized personnel only.</p>
            <button onclick="adminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold shadow flex items-center justify-center gap-2">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <p id="authError" class="text-red-500 text-sm mt-4 hidden-section font-semibold"></p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shadow-lg">
        <div class="p-6 border-b border-gray-800">
            <h2 class="text-xl font-bold text-orange-500">Ramyasri Food</h2>
            <p class="text-xs text-gray-400">Admin Panel v2.0</p>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <button onclick="nav('dashboard')" class="w-full text-left px-6 py-3 hover:bg-gray-800 transition flex items-center gap-3"><i class="fas fa-chart-pie w-5"></i> Dashboard</button>
            <button onclick="nav('kitchen')" class="w-full text-left px-6 py-3 hover:bg-gray-800 transition flex items-center gap-3"><i class="fas fa-fire w-5"></i> Live Kitchen <span id="navOrderCount" class="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full ml-auto">0</span></button>
            <button onclick="nav('menu')" class="w-full text-left px-6 py-3 hover:bg-gray-800 transition flex items-center gap-3"><i class="fas fa-book-open w-5"></i> Menu Master</button>
            <button onclick="nav('settings')" class="w-full text-left px-6 py-3 hover:bg-gray-800 transition flex items-center gap-3"><i class="fas fa-cog w-5"></i> Settings</button>
        </nav>
        <div class="p-4 border-t border-gray-800 text-center">
            <button onclick="auth.signOut()" class="text-gray-400 hover:text-white text-sm"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-gray-100 p-6 relative">
        
        <!-- Dashboard -->
        <div id="view-dashboard" class="hidden-section">
            <h1 class="text-2xl font-bold mb-6">Overview</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-gray-500 text-sm">Today's Revenue</p>
                    <h3 class="text-2xl font-bold text-gray-900" id="dashRevToday">₹0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-gray-500 text-sm">Today's Orders</p>
                    <h3 class="text-2xl font-bold text-gray-900" id="dashOrdToday">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-gray-500 text-sm">Pending Orders</p>
                    <h3 class="text-2xl font-bold text-orange-500" id="dashPending">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-gray-500 text-sm">Lifetime Revenue</p>
                    <h3 class="text-2xl font-bold text-green-600" id="dashRevLife">₹0</h3>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border"><canvas id="revChart"></canvas></div>
                <div class="bg-white p-5 rounded-xl shadow-sm border"><canvas id="itemsChart"></canvas></div>
            </div>
        </div>

        <!-- Live Kitchen -->
        <div id="view-kitchen" class="hidden-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-red-600"><i class="fas fa-fire"></i> Live Kitchen Monitor</h1>
                <div class="flex gap-2">
                    <select id="kitchenFilter" onchange="renderKitchen()" class="border rounded px-3 py-1">
                        <option value="All">All Active</option>
                        <option value="Placed">New (Placed)</option>
                        <option value="Preparing">Preparing</option>
                        <option value="OutForDelivery">Out For Delivery</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="kitchenGrid"></div>
        </div>

        <!-- Menu Master -->
        <div id="view-menu" class="hidden-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Menu Master</h1>
                <button onclick="openItemModal()" class="bg-gray-900 text-white px-4 py-2 rounded shadow">+ Add Item</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="p-4">Item</th>
                            <th class="p-4">Category</th>
                            <th class="p-4">Price</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="menuTableBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <!-- Settings (Tabbed) -->
        <div id="view-settings" class="hidden-section bg-white rounded-xl shadow-sm border h-full flex flex-col">
            <div class="border-b overflow-x-auto whitespace-nowrap px-4 pt-2">
                <button class="tab-btn active px-4 py-3 font-semibold text-sm" onclick="switchTab(1, this)">General</button>
                <button class="tab-btn px-4 py-3 font-semibold text-sm text-gray-500" onclick="switchTab(4, this)">Payment</button>
                <button class="tab-btn px-4 py-3 font-semibold text-sm text-gray-500" onclick="switchTab(6, this)">Store</button>
                <button class="tab-btn px-4 py-3 font-semibold text-sm text-gray-500" onclick="switchTab(7, this)">Coupons</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <!-- Tab 1: General -->
                <div id="tab-1" class="space-y-4 max-w-lg">
                    <div><label class="block text-sm font-bold text-gray-700">Restaurant Name</label><input type="text" id="setRestName" class="w-full border p-2 rounded mt-1"></div>
                    <div><label class="block text-sm font-bold text-gray-700">WhatsApp Help Number</label><input type="text" id="setWa" class="w-full border p-2 rounded mt-1"></div>
                    <button onclick="saveSettings('general')" class="bg-green-600 text-white px-6 py-2 rounded font-bold shadow">Save General Settings</button>
                </div>
                <!-- Tab 4: Payment -->
                <div id="tab-4" class="hidden-section space-y-4 max-w-lg">
                    <div><label class="block text-sm font-bold text-gray-700">Primary UPI ID</label><input type="text" id="setUpiId" class="w-full border p-2 rounded mt-1"></div>
                    <div><label class="block text-sm font-bold text-gray-700">UPI QR Code URL</label><input type="text" id="setUpiQr" class="w-full border p-2 rounded mt-1"></div>
                    <button onclick="saveSettings('payment')" class="bg-green-600 text-white px-6 py-2 rounded font-bold shadow">Save Payment Settings</button>
                </div>
                <!-- Tab 6: Store -->
                <div id="tab-6" class="hidden-section space-y-4 max-w-lg">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-bold text-gray-700">Min Order (₹)</label><input type="number" id="setMinOrder" class="w-full border p-2 rounded mt-1"></div>
                        <div><label class="block text-sm font-bold text-gray-700">Delivery Charge (₹)</label><input type="number" id="setDelCharge" class="w-full border p-2 rounded mt-1"></div>
                        <div><label class="block text-sm font-bold text-gray-700">Free Delivery Above (₹)</label><input type="number" id="setFreeDel" class="w-full border p-2 rounded mt-1"></div>
                        <div><label class="block text-sm font-bold text-gray-700">GST %</label><input type="number" id="setGst" class="w-full border p-2 rounded mt-1"></div>
                    </div>
                    <button onclick="saveSettings('store')" class="bg-green-600 text-white px-6 py-2 rounded font-bold shadow">Save Store Settings</button>
                </div>
                <!-- Tab 7: Coupons -->
                <div id="tab-7" class="hidden-section max-w-2xl">
                    <div class="bg-gray-50 p-4 rounded-lg border mb-4">
                        <h3 class="font-bold mb-3">Create Coupon</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="cpnCode" placeholder="Code (e.g. WELCOME50)" class="border p-2 rounded">
                            <select id="cpnType" class="border p-2 rounded"><option value="fixed">Fixed Amount (₹)</option><option value="percent">Percentage (%)</option></select>
                            <input type="number" id="cpnValue" placeholder="Value (e.g. 50)" class="border p-2 rounded">
                            <input type="number" id="cpnMin" placeholder="Min Order Amount" class="border p-2 rounded">
                        </div>
                        <button onclick="createCoupon()" class="bg-blue-600 text-white px-4 py-2 rounded mt-3 font-bold">Add Coupon</button>
                    </div>
                    <div id="couponsList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="itemModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden-section flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
            <h2 class="text-xl font-bold mb-4" id="itemModalTitle">Add Item</h2>
            <input type="hidden" id="itemEditId">
            <div class="space-y-3">
                <input type="text" id="itemName" placeholder="Item Name" class="w-full border p-2 rounded">
                <input type="text" id="itemCat" placeholder="Category" class="w-full border p-2 rounded">
                <input type="number" id="itemPrice" placeholder="Price (₹)" class="w-full border p-2 rounded">
                <input type="text" id="itemImg" placeholder="Image URL" class="w-full border p-2 rounded">
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2"><input type="checkbox" id="itemVeg"> Pure Veg</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="itemStock" checked> In Stock</label>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="document.getElementById('itemModal').classList.add('hidden-section')" class="px-4 py-2 text-gray-500">Cancel</button>
                <button onclick="saveItem()" class="bg-gray-900 text-white px-6 py-2 rounded font-bold shadow">Save Item</button>
            </div>
        </div>
    </div>

    <!-- Hidden KOT Print Section -->
    <div id="kotPrintArea" class="kot-print bg-white text-black"></div>

    <script>
        // EXACT Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBaDnV72Z0VKqLOHTqN2ScisOSITOHbdo0",
            authDomain: "myfood-7ebe7.firebaseapp.com",
            databaseURL: "https://myfood-7ebe7-default-rtdb.firebaseio.com",
            projectId: "myfood-7ebe7",
            storageBucket: "myfood-7ebe7.firebasestorage.app",
            messagingSenderId: "144461701384",
            appId: "1:144461701384:web:dbaa97b526d1f938f28cbd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Admin Allowed Emails
        const ADMIN_EMAILS =[
            "bindhanibikash71@gmail.com", "bindhanib958@gmail.com", "bindhanibikash599@gmail.com",
            "bikashworm@gmail.com", "myfood.food.beverage@gmail.com", "bbindhani149@gmail.com"
        ];

        let allOrders = [];
        let allItems =[];
        let charts = {};
        
        // Audio for new order alert
        const alertSound = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3'); 

        // 1. AUTHENTICATION & FIREWALL
        auth.onAuthStateChanged(user => {
            if(user) {
                if(ADMIN_EMAILS.includes(user.email)) {
                    document.getElementById('authOverlay').classList.add('hidden-section');
                    initAdmin();
                } else {
                    document.getElementById('authError').innerText = "Access Denied. Unauthorized Email.";
                    document.getElementById('authError').classList.remove('hidden-section');
                    auth.signOut();
                }
            } else {
                document.getElementById('authOverlay').classList.remove('hidden-section');
                document.getElementById('authError').classList.add('hidden-section');
            }
        });

        function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        // 2. INITIALIZE ADMIN DATA
        function initAdmin() {
            nav('dashboard');
            
            // Listen Orders
            db.ref('orders').on('value', snap => {
                const oldLen = allOrders.filter(o => o.status === 'Placed').length;
                allOrders =[];
                snap.forEach(c => allOrders.push({id: c.key, ...c.val()}));
                
                // Alert Sound for new order
                const newLen = allOrders.filter(o => o.status === 'Placed').length;
                if(newLen > oldLen) {
                    alertSound.play().catch(e=>console.log(e));
                    if(Notification.permission === 'granted') new Notification('New Order Received!');
                }
                
                updateDashboard();
                if(document.getElementById('view-kitchen').classList.contains('hidden-section') === false) renderKitchen();
            });

            // Listen Menu
            db.ref('menu/items').on('value', snap => {
                allItems =[];
                snap.forEach(c => allItems.push({id: c.key, ...c.val()}));
                renderMenuTable();
            });

            // Listen Settings
            db.ref('settings').once('value', snap => {
                const d = snap.val() || {};
                if(d.general) {
                    document.getElementById('setRestName').value = d.general.restaurantName || '';
                    document.getElementById('setWa').value = d.general.whatsapp || '';
                }
                if(d.payment?.upi) {
                    document.getElementById('setUpiId').value = d.payment.upi.primaryId || '';
                    document.getElementById('setUpiQr').value = d.payment.upi.qrCodeUrl || '';
                }
                if(d.store) {
                    document.getElementById('setMinOrder').value = d.store.minOrder || '';
                    document.getElementById('setDelCharge').value = d.store.deliveryCharge || '';
                    document.getElementById('setFreeDel').value = d.store.freeDeliveryThreshold || '';
                    document.getElementById('setGst').value = d.store.gst?.percentage || '';
                }
            });

            // Listen Coupons
            db.ref('coupons').on('value', snap => {
                const list = document.getElementById('couponsList');
                list.innerHTML = '';
                snap.forEach(c => {
                    const cpn = c.val();
                    list.innerHTML += `<div class="flex justify-between items-center bg-white p-3 border rounded shadow-sm">
                        <div><span class="font-bold text-blue-600">${c.key}</span> - ${cpn.type==='percent'?cpn.value+'%': '₹'+cpn.value} off</div>
                        <button onclick="db.ref('coupons/${c.key}').remove()" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`;
                });
            });

            if(Notification.permission !== 'granted') Notification.requestPermission();
        }

        function nav(view) {['dashboard', 'kitchen', 'menu', 'settings'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden-section');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden-section');
        }

        // 3. DASHBOARD & CHARTS
        function updateDashboard() {
            const todayStr = new Date().toLocaleDateString();
            let revToday = 0, ordToday = 0, revLife = 0, pending = 0;
            
            allOrders.forEach(o => {
                if(o.status !== 'Cancelled') revLife += o.charges.total;
                if(o.status === 'Placed') pending++;
                
                if(new Date(o.timestamps.placed).toLocaleDateString() === todayStr) {
                    ordToday++;
                    if(o.status !== 'Cancelled') revToday += o.charges.total;
                }
            });

            document.getElementById('dashRevToday').innerText = `₹${revToday.toFixed(2)}`;
            document.getElementById('dashOrdToday').innerText = ordToday;
            document.getElementById('dashPending').innerText = pending;
            document.getElementById('navOrderCount').innerText = pending;
            document.getElementById('dashRevLife').innerText = `₹${revLife.toFixed(2)}`;

            // Init Charts (mocked data aggregation for brevity)
            if(!charts.rev) {
                const ctx = document.getElementById('revChart').getContext('2d');
                charts.rev = new Chart(ctx, { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets:[{label: 'Revenue', data:[1200, 1900, 3000, 5000, 2000, 3000, revToday], borderColor: '#f97316'}] }});
            } else { charts.rev.data.datasets[0].data[6] = revToday; charts.rev.update(); }
        }

        // 4. LIVE KITCHEN MONITOR
        function renderKitchen() {
            const grid = document.getElementById('kitchenGrid');
            const filter = document.getElementById('kitchenFilter').value;
            grid.innerHTML = '';

            let filtered = allOrders.filter(o => o.status !== 'Delivered' && o.status !== 'Cancelled');
            if(filter !== 'All') filtered = filtered.filter(o => o.status === filter);
            
            filtered.sort((a,b) => b.timestamps.placed - a.timestamps.placed);

            filtered.forEach(o => {
                const mins = Math.floor((Date.now() - o.timestamps.placed)/60000);
                const color = o.status === 'Placed' ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200';
                
                grid.innerHTML += `
                    <div class="${color} rounded-xl shadow-sm border p-4 relative">
                        ${mins > 30 ? '<div class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded animate-pulse">DELAYED</div>' : ''}
                        <div class="flex justify-between border-b pb-2 mb-2">
                            <div><h3 class="font-bold">#${o.id}</h3><p class="text-xs text-gray-500">${mins} mins ago</p></div>
                            <span class="font-bold text-lg text-orange-600">₹${o.charges.total}</span>
                        </div>
                        <div class="mb-3 text-sm">
                            <p><strong><i class="fas fa-user text-gray-400 w-4"></i></strong> ${o.customer.name} <a href="tel:${o.customer.phone}" class="text-blue-500 ml-2"><i class="fas fa-phone"></i></a></p>
                            <p class="text-xs text-gray-600 mt-1 line-clamp-2">📍 ${o.deliveryAddress.full}</p>
                        </div>
                        <div class="bg-gray-50 rounded p-2 mb-3 text-sm max-h-32 overflow-y-auto">
                            ${o.items.map(i => `<div class="flex justify-between border-b border-gray-100 last:border-0 py-1"><span>${i.qty}x ${i.name}</span><span>₹${i.price*i.qty}</span></div>`).join('')}
                        </div>
                        <div class="flex gap-2 mb-3">
                            <select onchange="updateStatus('${o.id}', this.value)" class="flex-1 border p-1 rounded text-sm bg-white font-semibold">
                                <option value="Placed" ${o.status==='Placed'?'selected':''}>Placed</option>
                                <option value="Confirmed" ${o.status==='Confirmed'?'selected':''}>Confirmed</option>
                                <option value="Preparing" ${o.status==='Preparing'?'selected':''}>Preparing</option>
                                <option value="Ready" ${o.status==='Ready'?'selected':''}>Ready</option>
                                <option value="OutForDelivery" ${o.status==='OutForDelivery'?'selected':''}>Out For Delivery</option>
                                <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                            <button onclick="printKOT('${o.id}')" class="bg-gray-800 text-white px-3 py-1 rounded shadow-sm text-sm" title="Print KOT"><i class="fas fa-print"></i></button>
                        </div>
                        ${o.status === 'Placed' ? `
                            <div class="flex gap-2">
                                <button onclick="updateStatus('${o.id}', 'Confirmed')" class="flex-1 bg-green-500 text-white py-1.5 rounded text-sm font-bold shadow">ACCEPT</button>
                                <button onclick="updateStatus('${o.id}', 'Cancelled')" class="flex-1 bg-red-100 text-red-600 py-1.5 rounded text-sm font-bold">REJECT</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        function updateStatus(orderId, newStatus) {
            const history = [...(allOrders.find(o=>o.id===orderId).statusHistory || [])];
            history.push({status: newStatus, timestamp: Date.now()});
            
            let updates = { status: newStatus, statusHistory: history };
            if(newStatus === 'Delivered') updates['timestamps/delivered'] = Date.now();
            
            db.ref(`orders/${orderId}`).update(updates);
        }

        // KOT Print (Thermal Format)
        function printKOT(orderId) {
            const order = allOrders.find(o=>o.id === orderId);
            const date = new Date(order.timestamps.placed).toLocaleString();
            
            let html = `
                <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:5px; margin-bottom:5px;">
                    <h2>RAMYASRI FOOD</h2>
                    <p style="margin:0;">KOT - #${orderId}</p>
                    <p style="margin:0;">${date}</p>
                </div>
                <div style="margin-bottom:10px;">
                    <p style="margin:0;"><strong>Cust:</strong> ${order.customer.name}</p>
                    <p style="margin:0;"><strong>Ph:</strong> ${order.customer.phone}</p>
                </div>
                <table style="width:100%; border-collapse: collapse;">
                    <tr style="border-bottom:1px solid #000;"><th align="left">Item</th><th align="right">Qty</th></tr>
                    ${order.items.map(i => `<tr><td>${i.name}</td><td align="right"><strong>${i.qty}</strong></td></tr>`).join('')}
                </table>
                <p style="text-align:center; border-top:1px dashed #000; margin-top:10px; padding-top:5px;">-- End of KOT --</p>
            `;
            
            const area = document.getElementById('kotPrintArea');
            area.innerHTML = html;
            window.print();
        }

        // 5. MENU MASTER
        function renderMenuTable() {
            const tbody = document.getElementById('menuTableBody');
            tbody.innerHTML = '';
            allItems.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 flex items-center gap-3">
                            <img src="${item.image || 'https://i.ibb.co/nNMJzzwx/IMG-20260412-WA0000.jpg'}" class="w-10 h-10 rounded object-cover">
                            <span class="font-bold">${item.name} <span class="text-xs px-1 rounded ${item.veg?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${item.veg?'V':'NV'}</span></span>
                        </td>
                        <td class="p-4">${item.categoryId}</td>
                        <td class="p-4 font-bold">₹${item.price}</td>
                        <td class="p-4">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${item.inStock?'checked':''} onchange="db.ref('menu/items/${item.id}').update({inStock: this.checked})">
                                <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                            </label>
                        </td>
                        <td class="p-4">
                            <button onclick="editItem('${item.id}')" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
                            <button onclick="if(confirm('Delete?')) db.ref('menu/items/${item.id}').remove()" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function openItemModal() {
            document.getElementById('itemModalTitle').innerText = 'Add Item';
            document.getElementById('itemEditId').value = '';
            ['itemName','itemCat','itemPrice','itemImg'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('itemVeg').checked = false;
            document.getElementById('itemStock').checked = true;
            document.getElementById('itemModal').classList.remove('hidden-section');
        }

        function editItem(id) {
            const item = allItems.find(i=>i.id===id);
            document.getElementById('itemModalTitle').innerText = 'Edit Item';
            document.getElementById('itemEditId').value = id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCat').value = item.categoryId;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemImg').value = item.image || '';
            document.getElementById('itemVeg').checked = item.veg;
            document.getElementById('itemStock').checked = item.inStock;
            document.getElementById('itemModal').classList.remove('hidden-section');
        }

        function saveItem() {
            const id = document.getElementById('itemEditId').value || 'ITEM' + Date.now();
            const data = {
                name: document.getElementById('itemName').value,
                categoryId: document.getElementById('itemCat').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                image: document.getElementById('itemImg').value,
                veg: document.getElementById('itemVeg').checked,
                inStock: document.getElementById('itemStock').checked
            };
            db.ref(`menu/items/${id}`).set(data).then(() => {
                document.getElementById('itemModal').classList.add('hidden-section');
            });
        }

        // 6. SETTINGS (Tabs & Savings)
        function switchTab(num, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-gray-500'); });
            btn.classList.add('active'); btn.classList.remove('text-gray-500');
            [1,4,6,7].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden-section'));
            document.getElementById(`tab-${num}`).classList.remove('hidden-section');
        }

        function saveSettings(type) {
            if(type === 'general') {
                db.ref('settings/general').update({
                    restaurantName: document.getElementById('setRestName').value,
                    whatsapp: document.getElementById('setWa').value
                });
                alert("General settings saved!");
            }
            if(type === 'payment') {
                db.ref('settings/payment/upi').update({
                    primaryId: document.getElementById('setUpiId').value,
                    qrCodeUrl: document.getElementById('setUpiQr').value
                });
                alert("Payment settings saved!");
            }
            if(type === 'store') {
                db.ref('settings/store').update({
                    minOrder: parseFloat(document.getElementById('setMinOrder').value),
                    deliveryCharge: parseFloat(document.getElementById('setDelCharge').value),
                    freeDeliveryThreshold: parseFloat(document.getElementById('setFreeDel').value),
                    gst: { percentage: parseFloat(document.getElementById('setGst').value) }
                });
                alert("Store settings saved!");
            }
        }

        function createCoupon() {
            const code = document.getElementById('cpnCode').value.toUpperCase();
            if(!code) return alert("Code needed");
            const data = {
                type: document.getElementById('cpnType').value,
                value: parseFloat(document.getElementById('cpnValue').value),
                minOrder: parseFloat(document.getElementById('cpnMin').value),
                active: true
            };
            db.ref(`coupons/${code}`).set(data);
            ['cpnCode','cpnValue','cpnMin'].forEach(id => document.getElementById(id).value = '');
        }

    </script>
</body>
</html>
